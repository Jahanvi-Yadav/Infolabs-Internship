{% extends 'rentalapp/base.html' %}

{% block content %}

<div class="container mt-5">

    <h2 class="mb-4">My Wishlist</h2>

    {% if wishlist_items %}

    <div class="row">

        {% for item in wishlist_items %}

        <div class="col-md-4">

            <div class="card mb-4 shadow">

                <img src="{{ item.property.property_image.url }}"
                     class="card-img-top"
                     height="220">

                <div class="card-body">

                    <h5>{{ item.property.title }}</h5>

                    <p>₹ {{ item.property.monthly_rent }}</p>

                    <a href="{% url 'property_detail' item.property.id %}"
                       class="btn btn-primary">
                        View Property
                    </a>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

    {% else %}

    <div class="alert alert-info">
        Wishlist is empty.
    </div>

    {% endif %}

</div>

{% endblock %}
